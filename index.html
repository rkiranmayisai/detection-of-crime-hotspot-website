<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crime Hotspot Detection</title>
    <!-- Modern Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <!-- Custom Styles -->
    <link rel="stylesheet" href="/static/css/style.css">
</head>

<body>
    <div class="app-container">
        <!-- Minimalistic Header -->
        <header class="glass-header">
            <div>
                <h1>Crime Hotspots</h1>
                <p>Crowdsourced Safety Insights</p>
            </div>
            <div class="header-badges">
                <span class="badge live-badge"><span class="dot"></span> Live Updates</span>
            </div>
        </header>

        <main class="main-content">
            <div id="map-container">
                <div id="map"></div>

                <!-- Floating Submission Panel -->
                <div class="report-panel glass-panel">
                    <h2>Report an Incident</h2>
                    <p class="subtitle">Click anywhere on the map to mark a location.</p>
                    <form id="report-form">
                        <div class="form-group">
                            <label for="crime-type">Type of Incident</label>
                            <select id="crime-type" required>
                                <option value="" disabled selected>Select an option</option>
                                <option value="Theft">Theft</option>
                                <option value="Assault">Assault</option>
                                <option value="Vandalism">Vandalism</option>
                                <option value="Suspicious Activity">Suspicious Activity</option>
                                <option value="Other">Other</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label for="description">Description <span class="optional">(Optional)</span></label>
                            <textarea id="description" rows="3" placeholder="Provide extra details..."></textarea>
                        </div>

                        <div class="coordinates">
                            <div class="coord-box">
                                <span class="coord-label">Latitude</span>
                                <span id="lat-display" class="coord-val">--</span>
                            </div>
                            <div class="coord-box">
                                <span class="coord-label">Longitude</span>
                                <span id="lng-display" class="coord-val">--</span>
                            </div>
                        </div>

                        <input type="hidden" id="lat-input" required>
                        <input type="hidden" id="lng-input" required>

                        <button type="submit" class="submit-btn" id="submit-btn" disabled>
                            <span>Submit Report</span>
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                stroke-linejoin="round">
                                <line x1="22" y1="2" x2="11" y2="13"></line>
                                <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                            </svg>
                        </button>
                    </form>
                    <div id="status-message"></div>
                </div>
            </div>
        </main>
    </div>

    <!-- Scripts -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <!-- Leaflet Heatmap Plugin -->
    <script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>
    <script src="/static/js/app.js"></script>
</body>

</html>
